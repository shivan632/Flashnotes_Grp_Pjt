<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashnotes - AI-Powered Learning</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="public/favicon.ico">
    
    <!-- API Configuration - IMPORTANT: Update with your actual Render backend URL -->
    <script>
        (function() {
            const isLocal = window.location.hostname === 'localhost' || 
                           window.location.hostname === '127.0.0.1';
            
            if (isLocal) {
                window.API_URL = 'http://localhost:10000/api';
            } else {
                // Use your Render backend URL
                window.API_URL = 'https://flashnotes-api.onrender.com/api';
            }
            console.log('🔧 API_URL:', window.API_URL);
        })();
    </script>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#111827',
                        card: '#1F2937',
                        primary: '#3B82F6',
                        secondary: '#60A5FA',
                        text: '#E5E7EB',
                        accent: '#A78BFA',
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/src/style.css">
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, sendSignInLinkToEmail } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAiNaEov6XE8bhaOUDpqaf5x91UoatpyXI",
            authDomain: "flashnotes-7208c.firebaseapp.com",
            projectId: "flashnotes-7208c",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Make available globally
        window.firebaseAuth = auth;
        window.sendSignInLinkToEmail = sendSignInLinkToEmail;
        console.log('✅ Firebase initialized');
    </script>
    
    <style>
        /* Additional Styles */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111827;
            color: #E5E7EB;
        }
        
        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1F2937;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #3B82F6;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #60A5FA;
        }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out;
        }
        
        .animate-slideIn {
            animation: slideIn 0.3s ease-out;
        }
        
        /* Loading spinner */
        .loading-spinner {
            width: 80px;
            height: 80px;
            position: relative;
            margin: 0 auto;
        }
        
        .loading-spinner div {
            position: absolute;
            border: 4px solid transparent;
            border-top-color: #3B82F6;
            border-radius: 50%;
            animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }
        
        .loading-spinner div:nth-child(1) {
            width: 100%;
            height: 100%;
            border-top-color: #3B82F6;
        }
        
        .loading-spinner div:nth-child(2) {
            width: 70%;
            height: 70%;
            top: 15%;
            left: 15%;
            border-top-color: #60A5FA;
            animation-direction: reverse;
            animation-duration: 1.2s;
        }
        
        .loading-spinner div:nth-child(3) {
            width: 40%;
            height: 40%;
            top: 30%;
            left: 30%;
            border-top-color: #A78BFA;
            animation-duration: 1s;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-spinner-small {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        
        /* Animated background */
        .animated-bg {
            background: linear-gradient(-45deg, #111827, #1F2937, #3B82F6, #A78BFA);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* OTP Side Box - Right Side Position */
        .otp-side-box {
            position: absolute;
            top: 20px;
            right: -120px;
            background: linear-gradient(135deg, #14532d 0%, #166534 100%);
            border: 1px solid #22c55e;
            border-radius: 12px;
            padding: 12px 16px;
            min-width: 140px;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
            animation: slideInRight 0.3s ease-out;
            z-index: 50;
        }
        
        .otp-side-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        
        .otp-side-code {
            font-size: 28px;
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 4px;
            color: #86efac;
        }
        
        .otp-side-copy {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 8px;
            padding: 6px;
            cursor: pointer;
            color: #bbf7d0;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .otp-side-copy:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        
        .otp-side-timer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 10px;
            color: #86efac;
            margin-top: 8px;
        }
        
        .otp-side-timer span {
            font-family: monospace;
            font-weight: 600;
        }
        
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        /* OTP Input Styles */
        .otp-digit {
            width: 52px;
            height: 52px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            background: #111827;
            border: 2px solid #3B82F6;
            border-radius: 12px;
            color: #E5E7EB;
            transition: all 0.2s;
        }
        
        .otp-digit:focus {
            outline: none;
            border-color: #A78BFA;
            transform: scale(1.02);
            box-shadow: 0 0 0 2px rgba(167, 139, 250, 0.3);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .otp-side-box {
                position: static;
                margin-bottom: 20px;
                max-width: 200px;
                margin-left: auto;
                margin-right: auto;
            }
            
            .otp-digit {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }
        }
        
        @media (max-width: 480px) {
            .otp-digit {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
        }
        
        /* Hide class */
        .hidden {
            display: none !important;
        }
        
        /* Toast styles */
        .toast-success {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10B981;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideInRight 0.3s ease-out;
        }
        
        .toast-error {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #EF4444;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideInRight 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-[#111827] text-[#E5E7EB] antialiased">
    <!-- App Container -->
    <div id="app">
        <!-- Initial loading state -->
        <div class="min-h-screen flex items-center justify-center">
            <div class="loading-spinner">
                <div></div>
                <div></div>
                <div></div>
            </div>
        </div>
    </div>
    
    <!-- Main Script -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
